{{- if not .Params.disableNewsletter }}
<div class="newsletter-box" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border: 1px solid #2a2a4a; border-radius: 12px; padding: 2rem; margin: 2rem 0; text-align: center;">
  <h3 style="color: #e0e0ff; margin-bottom: 0.5rem; font-size: 1.3rem;">📬 Get AI Tips Weekly</h3>
  <p style="color: #a0a0c0; margin-bottom: 1.2rem; font-size: 0.95rem;">Free AI tool reviews, study hacks, and coding tutorials. No spam.</p>
  <form action="https://buttondown.email/api/emails/embed-subscribe/joyroy5494" method="post" target="popupwindow" onsubmit="window.open('https://buttondown.email/joyroy5494', 'popupwindow')" style="display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;">
    <input type="email" name="email" placeholder="Enter your email" required style="padding: 0.7rem 1rem; border-radius: 8px; border: 1px solid #3a3a5a; background: #0d0d1a; color: #e0e0ff; font-size: 0.95rem; min-width: 250px;" />
    <button type="submit" style="padding: 0.7rem 1.5rem; border-radius: 8px; border: none; background: #4f46e5; color: white; font-weight: 600; cursor: pointer; font-size: 0.95rem;">Subscribe Free</button>
  </form>
  <p style="color: #6a6a8a; margin-top: 0.8rem; font-size: 0.8rem;">🔒 We respect your privacy. Unsubscribe with one click.</p>
</div>
{{- end }}
