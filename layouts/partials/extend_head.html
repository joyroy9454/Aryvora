<!-- Structured Data / Schema.org -->
{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "AI Blog Factory",
  "url": "https://joyroy9454.github.io/ai-blog-factory/",
  "description": "Premium digital guides, eBooks, and playbooks for students, creators, and tech learners.",
  "publisher": {
    "@type": "Person",
    "name": "Joy Roy",
    "url": "https://joyroy9454.github.io/ai-blog-factory/about/"
  },
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "https://joyroy9454.github.io/ai-blog-factory/search/?q={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  }
}
</script>
{{- end }}

{{- if and .IsPage (eq .Section "posts") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Description }}",
  "author": {
    "@type": "Person",
    "name": "Joy Roy",
    "url": "https://joyroy9454.github.io/ai-blog-factory/about/"
  },
  "publisher": {
    "@type": "Organization",
    "name": "AI Blog Factory",
    "logo": {
      "@type": "ImageObject",
      "url": "https://joyroy9454.github.io/ai-blog-factory/images/logo.svg"
    }
  },
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  }{{- if .Params.cover }},
  "image": {
    "@type": "ImageObject",
    "url": "{{ .Params.cover.image | absURL }}"
  }{{- end }}
}
</script>

{{- if .Params.faq }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{- range $i, $faq := .Params.faq }}
    {{- if $i }},{{ end }}
    {
      "@type": "Question",
      "name": "{{ $faq.question }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ $faq.answer }}"
      }
    }
    {{- end }}
  ]
}
</script>
{{- end }}
{{- end }}

{{- if and .IsPage (eq .Type "about") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfilePage",
  "name": "AI Blog Factory",
  "description": "Premium digital guides and eBooks for students, creators, and tech learners.",
  "mainEntity": {
    "@type": "Person",
    "name": "Joy Roy",
    "url": "https://joyroy9454.github.io/ai-blog-factory/about/",
    "description": "BSc Data Science student, vibe coder, and founder of AI Blog Factory",
    "sameAs": [
      "https://github.com/joyroy9454"
    ]
  }
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "AI Blog Factory",
  "url": "https://joyroy9454.github.io/ai-blog-factory/",
  "logo": "https://joyroy9454.github.io/ai-blog-factory/images/logo.svg",
  "founder": {
    "@type": "Person",
    "name": "Joy Roy"
  },
  "sameAs": [
    "https://github.com/joyroy9454"
  ]
}
</script>
{{- end }}
