{{ define "main" }}
<div class="products-list">
  <h1>Products</h1>
  <p class="page-description">Premium digital guides from AI Blog Factory.</p>
  <div class="product-grid">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="product-card">
      <div class="card-body">
        <h2>{{ .Title }}</h2>
        <p>{{ .Description }}</p>
        <span class="card-link">View Product →</span>
      </div>
    </a>
    {{ end }}
  </div>
</div>

<style>
.products-list { max-width: 900px; margin: 0 auto; }
.products-list h1 {
  font-size: 2.2rem;
  margin-bottom: 0.5rem;
}
.page-description {
  color: #94a3b8;
  font-size: 1.1rem;
  margin-bottom: 2.5rem;
}
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1.5rem;
}
.product-card {
  background: rgba(30, 41, 59, 0.5);
  border: 1px solid rgba(71, 85, 105, 0.4);
  border-radius: 12px;
  padding: 1.75rem;
  transition: all 0.3s ease;
  text-decoration: none !important;
  display: block;
}
.product-card:hover {
  border-color: #4f46e5;
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(79, 70, 229, 0.15);
}
.product-card h2 {
  font-size: 1.3rem;
  color: #e2e8f0;
  margin-bottom: 0.5rem;
}
.product-card p {
  color: #94a3b8;
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 1rem;
}
.card-link {
  color: #818cf8;
  font-weight: 600;
  font-size: 0.9rem;
}
@media (max-width: 768px) {
  .product-grid { grid-template-columns: 1fr; }
}
</style>
{{ end }}
