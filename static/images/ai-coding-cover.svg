<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="630" fill="rgba(88,166,255,0.03)"/>
  
  <!-- Decorative code brackets -->
  <text x="80" y="120" font-family="monospace" font-size="80" fill="rgba(88,166,255,0.15)" font-weight="bold">{</text>
  <text x="1080" y="560" font-family="monospace" font-size="80" fill="rgba(88,166,255,0.15)" font-weight="bold">}</text>
  
  <!-- Small decorative elements -->
  <circle cx="150" cy="500" r="40" fill="rgba(88,166,255,0.06)"/>
  <circle cx="1050" cy="130" r="60" fill="rgba(163,113,247,0.06)"/>
  <circle cx="900" cy="480" r="30" fill="rgba(88,166,255,0.08)"/>
  
  <!-- Title -->
  <text x="600" y="220" font-family="system-ui, sans-serif" font-size="52" fill="#e6edf3" font-weight="800" text-anchor="middle" letter-spacing="-1">10 Best AI Coding</text>
  <text x="600" y="290" font-family="system-ui, sans-serif" font-size="52" fill="url(#accent)" font-weight="800" text-anchor="middle" letter-spacing="-1">Assistants for Students</text>
  
  <!-- Year badge -->
  <rect x="480" y="330" width="240" height="44" rx="22" fill="rgba(88,166,255,0.15)" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
  <text x="600" y="361" font-family="system-ui, sans-serif" font-size="22" fill="#58a6ff" font-weight="700" text-anchor="middle">2026 Edition</text>
  
  <!-- Subtitle -->
  <text x="600" y="430" font-family="system-ui, sans-serif" font-size="22" fill="#8b949e" text-anchor="middle">Free &amp; Paid Tools Compared</text>
  
    <!-- Bottom line -->
  <line x1="400" y1="500" x2="800" y2="500" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
</svg>