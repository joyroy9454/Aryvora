  <path d="M 0 370 Q 500 390.0 1200 410" stroke="#d8b4fe" stroke-width="3" fill="none" opacity="0.30000000000000004" stroke-linecap="round"/>
  <path d="M 0 460 Q 700 480.0 1200 500" stroke="#d8b4fe" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round"/>
