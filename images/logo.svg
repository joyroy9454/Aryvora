<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="2" y="2" width="508" height="508" rx="94" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.3"/>
  
  <!-- Neural network nodes -->
  <circle cx="160" cy="160" r="28" fill="none" stroke="url(#g1)" stroke-width="3" opacity="0.9"/>
  <circle cx="160" cy="160" r="12" fill="url(#g1)" filter="url(#glow)"/>
  
  <circle cx="352" cy="160" r="28" fill="none" stroke="url(#g1)" stroke-width="3" opacity="0.9"/>
  <circle cx="352" cy="160" r="12" fill="url(#g1)" filter="url(#glow)"/>
  
  <circle cx="160" cy="352" r="28" fill="none" stroke="url(#g2)" stroke-width="3" opacity="0.9"/>
  <circle cx="160" cy="352" r="12" fill="url(#g2)" filter="url(#glow)"/>
  
  <circle cx="352" cy="352" r="28" fill="none" stroke="url(#g2)" stroke-width="3" opacity="0.9"/>
  <circle cx="352" cy="352" r="12" fill="url(#g2)" filter="url(#glow)"/>
  
  <!-- Center hub -->
  <circle cx="256" cy="256" r="48" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.7"/>
  <circle cx="256" cy="256" r="24" fill="url(#g1)" opacity="0.15"/>
  <circle cx="256" cy="256" r="10" fill="url(#g1)" filter="url(#glow)"/>
  
  <!-- Connection lines -->
  <line x1="188" y1="160" x2="208" y2="256" stroke="url(#g1)" stroke-width="2" opacity="0.4"/>
  <line x1="324" y1="160" x2="304" y2="256" stroke="url(#g1)" stroke-width="2" opacity="0.4"/>
  <line x1="188" y1="352" x2="208" y2="256" stroke="url(#g2)" stroke-width="2" opacity="0.4"/>
  <line x1="324" y1="352" x2="304" y2="256" stroke="url(#g2)" stroke-width="2" opacity="0.4"/>
  <line x1="160" y1="188" x2="160" y2="324" stroke="#30363d" stroke-width="1.5" opacity="0.3"/>
  <line x1="352" y1="188" x2="352" y2="324" stroke="#30363d" stroke-width="1.5" opacity="0.3"/>
  <line x1="188" y1="160" x2="324" y2="160" stroke="#30363d" stroke-width="1.5" opacity="0.3"/>
  <line x1="188" y1="352" x2="324" y2="352" stroke="#30363d" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Data points -->
  <circle cx="256" cy="140" r="5" fill="#58a6ff" opacity="0.6"/>
  <circle cx="256" cy="372" r="5" fill="#3fb950" opacity="0.6"/>
  <circle cx="140" cy="256" r="5" fill="#a371f7" opacity="0.6"/>
  <circle cx="372" cy="256" r="5" fill="#d29922" opacity="0.6"/>
  
  <!-- Text: AI -->
  <text x="256" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#e6edf3" letter-spacing="2">AI</text>
</svg>
