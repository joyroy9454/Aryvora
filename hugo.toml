baseURL = 'https://joyroy9454.github.io/ai-blog-factory/'
languageCode = 'en-us'
title = 'AI Blog Factory'
theme = 'PaperMod'
paginate = 9

[params]
  author = 'Joy Roy'
  description = 'Premium digital guides and eBooks for students, creators, and tech learners. Built by Joy Roy.'
  defaultTheme = 'dark'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  DateFormat = 'January 2, 2006'

  # Cover image settings
  [params.cover]
    linkFullImages = true
    responsiveImages = true

  # Default image for social sharing (homepage, etc.)
  images = ["/images/og-default.svg"]

  # Site logo
  logo = "/images/logo.svg"

  # Homepage info
  [params.homeInfoParams]
    Title = 'AI Blog Factory'
    Content = 'Digital guides for students, creators & tech learners. Premium eBooks, playbooks, and practical resources to help you study smarter, code faster, and build your future with AI.'

  # Social icons
  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/joyroy9454'
  [[params.socialIcons]]
    name = 'rss'
    url = '/ai-blog-factory/index.xml'

  # Assets
  [params.assets]
    favicon = 'favicon.ico'
    favicon16x16 = 'favicon-16x16.png'
    favicon32x32 = 'favicon-32x32.png'
    apple_touch_icon = 'apple-touch-icon.png'

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    weight = 10
  [[menu.main]]
    identifier = 'products'
    name = 'Products'
    url = '/products/'
    weight = 20
  [[menu.main]]
    identifier = 'categories'
    name = 'Categories'
    url = '/categories/'
    weight = 30
  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 40
  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    weight = 50

[taxonomies]
  category = 'categories'
  tag = 'tags'

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'monokai'
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
    codeFences = true
    guessSyntax = true
