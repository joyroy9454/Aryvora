baseURL = 'https://joyroy9454.github.io/ai-blog-factory/'
# TODO: Update to https://aryvora.tech/ when domain is connected next week
languageCode = 'en-us'
title = 'Aryvora'
theme = 'PaperMod'
paginate = 9

# ============================================================
# SEO: Robots
# ============================================================
enableRobotsTXT = true

# ============================================================
# SEO: URL Structure
# ============================================================
[permalinks]
  posts = '/posts/:slug/'
  products = '/products/:slug/'

# ============================================================
# Site Parameters
# ============================================================
[params]
  author = 'Joy Roy'
  description = 'Aryvora — technology for the next generation. AI tools, coding tutorials, cloud guides, and productivity systems for students, developers, and tech learners.'
  defaultTheme = 'dark'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  DateFormat = 'January 2, 2006'

  # SEO: Images
  [params.cover]
    linkFullImages = true
    responsiveImages = true

  images = ["/images/aryvora-logo-main.png"]
  logo = "/images/logo-32.png"

  # Homepage Info
  [params.homeInfoParams]
    Title = 'Aryvora'
    Content = 'Technology for the next generation. AI tools, coding tutorials, cloud guides, and productivity systems — built for students, developers, and tech learners.'

  # Contact
  [params.contact]
    email = 'joyroy9454@gmail.com'

  # Social Icons
  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/joyroy9454'
  [[params.socialIcons]]
    name = 'rss'
    url = '/ai-blog-factory/index.xml'

  # Favicon / Assets
  [params.assets]
    favicon = 'favicon.ico'
    favicon16x16 = 'favicon-16x16.png'
    favicon32x32 = 'favicon-32x32.png'
    apple_touch_icon = 'apple-touch-icon.png'

  # SEO: Label for taxonomy pages
  [params.label]
    text = 'Aryvora'
    icon = '/images/logo-32.png'
    iconHeight = 35

# ============================================================
# Navigation Menu
# ============================================================
[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    weight = 10
  [[menu.main]]
    identifier = 'products'
    name = 'Products'
    url = '/products/'
    weight = 20
  [[menu.main]]
    identifier = 'categories'
    name = 'Topics'
    url = '/categories/'
    weight = 30
  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    weight = 40

# ============================================================
# Taxonomies
# ============================================================
[taxonomies]
  category = 'categories'
  tag = 'tags'

# ============================================================
# Output Formats
# ============================================================
[outputs]
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML']
  term = ['HTML']

# ============================================================
# Sitemap
# ============================================================
[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5

# ============================================================
# Markup
# ============================================================
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'monokai'
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
    codeFences = true
    guessSyntax = true

# ============================================================
# Related Content (Internal Linking)
# ============================================================
[related]
  includeNewer = true
  threshold = 20
  toLower = false
  [[related.indices]]
    name = 'tags'
    weight = 80
  [[related.indices]]
    name = 'categories'
    weight = 60
  [[related.indices]]
    name = 'date'
    weight = 10

# ============================================================
# Imaging (Open Graph Image Processing)
# ============================================================
[imaging]
  quality = 85
  resampleFilter = 'Lanczos'
